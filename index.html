<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Libby Live</title>
<meta name="theme-color" content="#08101f">
<meta name="description" content="Libby Live mobile-first advocacy assistant and case-support dashboard.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Libby">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/libby_live/manifest.json">
<style>
:root{color-scheme:dark;--bg:#08101f;--bg2:#0d1530;--panel:rgba(16,24,50,.82);--panel2:rgba(23,34,68,.88);--line:rgba(255,255,255,.12);--line2:rgba(117,167,255,.34);--text:#eef2ff;--muted:#a7b0d6;--soft:#dce8ff;--accent:#75a7ff;--accent2:#8b5cf6;--good:#42c08c;--warn:#f2bb5e;--bad:#ef6f6f;--radius:24px;--touch:48px;--shadow:0 24px 90px rgba(0,0,0,.42)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body,#root{width:100%;height:100%;margin:0}body{overflow:hidden;background:radial-gradient(circle at top left,rgba(117,167,255,.28),transparent 34rem),radial-gradient(circle at 100% 8%,rgba(66,192,140,.14),transparent 26rem),linear-gradient(180deg,#070b16,#0d1530);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif}button,a{font:inherit}button{min-height:var(--touch);cursor:pointer}.app{height:100dvh;min-height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}.top{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:14px 16px 9px}.mark{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,#75a7ff,#42c08c);display:grid;place-items:center;color:#06111f;font-size:25px;font-weight:950;box-shadow:0 18px 42px rgba(66,192,140,.18)}.head{flex:1;min-width:0}.kicker{margin:0 0 2px;color:var(--muted);font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.08em}.head h1{margin:0;font-size:clamp(22px,6vw,34px);line-height:1;letter-spacing:-.055em}.pill{border:1px solid rgba(66,192,140,.34);background:rgba(66,192,140,.1);color:#d1fae5;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:850;white-space:nowrap}.main{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 112px}.view{display:none;max-width:1180px;margin:0 auto}.view.active{display:block}.hero,.card,.install,.chatbox{border:1px solid var(--line);background:linear-gradient(180deg,rgba(16,24,50,.88),rgba(16,24,50,.66));border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{padding:20px;margin-bottom:14px}.hero h2{font-size:clamp(34px,10vw,72px);line-height:.92;margin:8px 0 12px;letter-spacing:-.085em}.hero p{margin:0;color:var(--soft);line-height:1.48;font-size:16px}.grid{display:grid;gap:12px}.card{padding:16px}.card h3{margin:0 0 7px;font-size:16px}.card p,.card li{color:var(--muted);line-height:1.45}.card p{margin:0}.card ul{margin:8px 0 0;padding-left:18px}.section{margin:22px 0 10px;color:var(--muted);font-size:12px;font-weight:950;letter-spacing:.09em;text-transform:uppercase}.actions{display:grid;gap:10px;margin-top:16px}.btn,button.btn{min-height:52px;border:0;border-radius:18px;padding:0 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--text);text-decoration:none;font-weight:900}.primary{background:linear-gradient(135deg,var(--accent),#446fe0);box-shadow:0 16px 38px rgba(117,167,255,.24)}.success{background:linear-gradient(135deg,var(--good),#14b8a6);color:#04111c}.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line2)}.warn{background:rgba(242,187,94,.14);border:1px solid rgba(242,187,94,.36);color:#ffe2aa}.install{display:none;padding:14px;margin:0 auto 14px;border-color:rgba(242,187,94,.3);background:rgba(242,187,94,.09)}.install.show{display:block}.install h2{font-size:16px;margin:0 0 5px}.install p{margin:0;color:var(--soft);line-height:1.4}.row{display:flex;gap:12px;align-items:flex-start}.icon{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;flex:0 0 auto;background:rgba(117,167,255,.16);color:#c7d2fe;font-weight:950}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 8px;color:var(--muted);font-size:11px;font-weight:850}.tag.good{color:#d1fae5;border-color:rgba(66,192,140,.3);background:rgba(66,192,140,.1)}.tag.warn{color:#ffe2aa;border-color:rgba(242,187,94,.34);background:rgba(242,187,94,.1)}.chatbox{min-height:60dvh;display:flex;flex-direction:column;overflow:hidden}.log{flex:1;overflow:auto;padding:16px}.msg{max-width:90%;padding:13px 14px;border-radius:18px;margin:0 0 10px;line-height:1.42}.msg.libby{background:rgba(66,192,140,.11);border:1px solid rgba(66,192,140,.18)}.msg.user{margin-left:auto;background:rgba(117,167,255,.15);border:1px solid rgba(117,167,255,.23)}.chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px}.chips button{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.08);color:var(--soft);padding:0 13px;font-weight:850;min-height:42px}.composer{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px;border-top:1px solid var(--line);background:rgba(2,6,23,.28)}.composer input{width:100%;min-height:50px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.08);color:var(--text);padding:0 14px;outline:none}.composer button{min-width:58px;border:0;border-radius:18px;background:var(--accent);color:#fff;font-weight:900}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(2,6,23,.82);backdrop-filter:blur(20px)}.nav{border:0;border-radius:18px;background:transparent;color:var(--muted);font-size:11px;font-weight:850;display:grid;place-items:center;gap:3px;min-height:58px}.nav span{font-size:19px}.nav.active{background:rgba(117,167,255,.18);color:var(--text)}.rail{display:none}.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.68);display:grid;place-items:center;padding:16px}.modal.hide{display:none}.modal-card{width:min(680px,100%);border:1px solid var(--line);background:#101832;border-radius:24px;padding:20px}.modal-card h2{margin:0 0 8px}.modal-card p{color:var(--muted);line-height:1.5}.modal-actions{display:grid;gap:10px}.notice{border-left:4px solid var(--warn);background:rgba(242,187,94,.1);border-radius:12px;padding:12px;margin-top:14px;color:#ffe2aa;font-size:13px;line-height:1.45}@media(min-width:760px){.app{display:grid;grid-template-columns:92px minmax(0,1fr);grid-template-rows:auto minmax(0,1fr);padding-bottom:0}.rail{grid-row:1/3;display:flex;flex-direction:column;gap:10px;padding:calc(14px + env(safe-area-inset-top)) 12px 14px;border-right:1px solid var(--line);background:rgba(2,6,23,.38);backdrop-filter:blur(18px)}.rail-logo{width:56px;height:56px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,#75a7ff,#42c08c);color:#06111f;font-weight:950;margin:0 auto 12px}.rail button{width:68px;min-height:62px;border:0;border-radius:20px;background:transparent;color:var(--muted);font-size:11px;font-weight:850;display:grid;place-items:center}.rail button span{font-size:20px}.rail button.active{background:rgba(117,167,255,.18);color:var(--text)}.top{padding:calc(18px + env(safe-area-inset-top)) 28px 10px}.main{padding:10px 28px 32px}.bottom{display:none}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.hero{padding:30px}.two{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr);gap:14px}}@media(min-width:1080px){.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div id="root"></div>
<div id="authModal" class="modal hide" role="dialog" aria-modal="true"><div class="modal-card"><h2 id="authTitle">Authentication required</h2><p id="authText"></p><div class="modal-actions"><a class="btn success" href="libby_librarian.html?mode=local-dev&user=001">Developer bypass: open Matthew dashboard <span>→</span></a><a class="btn warn" href="libby_librarian.html?mode=demo&user=demo_001">Open Guest Demo <span>redacted →</span></a><button class="btn secondary" onclick="closeAuth()">Back <span>×</span></button></div><div class="notice">Developer bypass is temporary for iPad testing. Production should replace this with Supabase/Firebase auth and remove unauthenticated private access.</div></div></div>
<script>
const state={view:'today',messages:[{r:'libby',m:'Good morning. Libby is open as a full-screen mobile app shell. The next product move is to test onboarding, verification-notification, and the existing dashboard link on iPhone and iPad.'}]};
const views=[['today','Today','◆'],['chat','Chat','✦'],['vault','Vault','▣'],['tasks','Tasks','✓'],['admin','Admin','●']];
function standalone(){return matchMedia('(display-mode: standalone)').matches||navigator.standalone===true}
function greet(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening'}
function setView(v){state.view=v;render()}function openAuth(t){const c={apple:['Continue with Apple','This route should use Sign in with Apple. On iPhone/iPad it can approve with Face ID. Backend auth still needs Supabase/Firebase wiring.'],google:['Continue with Google','This route should connect the Google identity used for Gmail, Drive, and Calendar intake. Backend auth still needs wiring.'],passkey:['Use passkey / Face ID-supported login','This route should use WebAuthn/passkey. On Apple devices Face ID can unlock the passkey. Backend auth still needs wiring.'],create:['Create account','This route should create a Libby account, send confirmation/2FA, and keep ID verification as a notification instead of a blocker.']}[t];document.getElementById('authTitle').textContent=c[0];document.getElementById('authText').textContent=c[1];document.getElementById('authModal').classList.remove('hide')}function closeAuth(){document.getElementById('authModal').classList.add('hide')}
function addMsg(t,r='user'){if(!t.trim())return;state.messages.push({r,m:t.trim()});if(r==='user')state.messages.push({r:'libby',m:'Captured. In production this should create a ledger entry, classify urgency, and offer a polished next action.'});render();setTimeout(()=>{let l=document.querySelector('.log');if(l)l.scrollTop=l.scrollHeight},0)}
function esc(s){return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function nav(cls){return views.map(v=>`<button class="${cls} ${state.view===v[0]?'active':''}" onclick="setView('${v[0]}')"><span>${v[2]}</span>${v[1]}</button>`).join('')}
function install(){return standalone()?'':`<section class="install show"><h2>Install Libby for the real app feel</h2><p>On iPhone or iPad: tap Share, choose Add to Home Screen, then open Libby from the Home Screen. That removes the normal Safari page feeling.</p></section>`}
function today(){return `<section class="view ${state.view==='today'?'active':''}"><div class="two"><div><section class="hero"><p class="kicker">Libby Live</p><h2>${greet()}, Matthew.</h2><p>This is now framed as a standalone mobile assistant shell first. The private dashboard, guest demo, registration, and verification paths sit behind app-style actions instead of a webpage landing screen.</p><div class="actions"><button class="btn success" onclick="openAuth('apple')">Continue with Apple <span>Face ID →</span></button><button class="btn success" onclick="openAuth('google')">Continue with Google <span>Drive · Gmail →</span></button><a class="btn primary" href="libby_librarian.html?mode=local-dev&user=001">Open Matthew dashboard <span>→</span></a><a class="btn warn" href="libby_librarian.html?mode=demo&user=demo_001">Guest Demo <span>redacted →</span></a></div></section><p class="section">Immediate brief</p><div class="grid three"><article class="card"><div class="row"><div class="icon">1</div><div><h3>Mobile-first shell</h3><p>iPhone is the primary layout. Bottom nav, safe areas, large touch targets, no desktop page feeling.</p></div></div></article><article class="card"><div class="row"><div class="icon">2</div><div><h3>Verification notice</h3><p>Front/back government ID should remain a visible account notification, not a blocker for early testing.</p></div></div></article><article class="card"><div class="row"><div class="icon">3</div><div><h3>Proactive assistant</h3><p>Libby should open with next steps, not a blank chat box.</p></div></div></article></div></div><aside><p class="section">Status</p><div class="grid"><article class="card"><h3>Ready to test</h3><p><span class="tag good">app shell</span> <span class="tag warn">auth wiring next</span></p><ul><li>Home-screen PWA metadata</li><li>Standalone layout</li><li>Dashboard and demo routes</li></ul></article><article class="card"><h3>Do not lose</h3><p>The existing private dashboard remains available at <strong>libby_librarian.html</strong>.</p></article></div></aside></div></section>`}
function chat(){return `<section class="view ${state.view==='chat'?'active':''}"><div class="chatbox"><div class="log">${state.messages.map(x=>`<div class="msg ${x.r==='user'?'user':'libby'}">${esc(x.m)}</div>`).join('')}</div><div class="chips"><button onclick="addMsg('Prepare Nikki onboarding steps.')">Nikki onboarding</button><button onclick="addMsg('Show today’s risks and missing documents.')">Show risks</button><button onclick="addMsg('Draft a registration confirmation email.')">Registration email</button><button onclick="addMsg('Explain what backend wiring is still missing.')">Backend gaps</button></div><form class="composer" onsubmit="event.preventDefault();addMsg(this.message.value);this.message.value=''"><input name="message" placeholder="Ask Libby anything..."><button>Send</button></form></div></section>`}
function simple(id,title,body){return `<section class="view ${state.view===id?'active':''}"><section class="hero"><p class="kicker">${title}</p><h2>${body[0]}</h2><p>${body[1]}</p></section><div class="grid three">${body.slice(2).map((b,i)=>`<article class="card"><h3>${b[0]}</h3><p>${b[1]}</p></article>`).join('')}</div></section>`}
function render(){document.getElementById('root').innerHTML=`<div class="app"><nav class="rail"><div class="rail-logo">L</div>${nav('railbtn')}</nav><div><header class="top"><div class="mark">L</div><div class="head"><p class="kicker">Libby Live</p><h1>${greet()}, Matthew</h1></div><div class="pill">App shell live</div></header><main class="main">${install()}${today()}${chat()}${simple('vault','Vault',['Evidence intake should be one tap.','Documents, screenshots, voice memos, call recordings, ID verification photos, receipts, and letters need to land in the same secure case memory flow.',['Upload path','Wire this to Supabase or Firebase Storage with user-scoped folders.'],['ID verification','Request front and back government ID as a pending verification notice.'],['Source ledger','Every upload should create timestamp, owner, confidence, and source fields.']])}${simple('tasks','Tasks',['Tasks should read like next moves.','Each task needs owner, urgency, evidence, due date, and a suggested polished output.',['High priority','Registration, confirmation email, 2FA/SMS, onboarding flow, and dashboard access.'],['Waiting on backend','Auth, storage, admin role checks, chat persistence, calendar sync.'],['Ready output','Morning brief, next actions, and user-specific onboarding status.']])}${simple('admin','Admin',['Admin should feel like a command centre.','The design supports user switching, but production must enforce role-based access before exposing real user data.',['Matthew','Patient Zero dashboard and development test user.'],['Newfie Nikki','Registration-ready second user with ID verification pending.'],['Kellsie','Household/support workspace shell for future private access.']])}</main></div><nav class="bottom">${nav('nav')}</nav></div>`}
render();
</script>
</body>
</html>
