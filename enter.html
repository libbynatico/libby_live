<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Entering Libby</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#08101f;color:#eef2ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}.card{max-width:520px;padding:24px;border:1px solid #2a396d;border-radius:22px;background:#101832;text-align:center}.muted{color:#a7b0d6}
</style>
</head>
<body>
<div class="card"><h1>Opening Libby…</h1><p class="muted" id="msg">Preparing workspace.</p></div>
<script>
const params=new URLSearchParams(location.search);
const rawUser=params.get('user')||params.get('user_id')||'guest';
const map={"001":"matthew","002":"kellsie","003":"kellsie","demo_001":"guest","guest":"guest","matthew":"matthew","kellsie":"kellsie"};
const appUser=map[rawUser]||'kellsie';
let state;
try{state=JSON.parse(localStorage.getItem('libby_librarian_state_v2')||'null')}catch(e){state=null}
if(!state){state={user:appUser,tasks:null,outputs:[],chat:[],notes:[]}}
state.user=appUser;
if(!Array.isArray(state.outputs))state.outputs=[];
if(!Array.isArray(state.chat))state.chat=[];
if(!Array.isArray(state.notes))state.notes=[];
const names={matthew:'Matthew',kellsie:'Kellsie',guest:'Guest Demo'};
const onboardingKey='libby_onboarding_'+rawUser;
let packet=null;
try{packet=JSON.parse(localStorage.getItem(onboardingKey)||'null')}catch(e){}
if(packet && packet.profile && packet.profile.preferred_name){
  state.chat.unshift({r:'libby',m:'Good morning, '+packet.profile.preferred_name+'. Your local onboarding packet is created. ID verification is still pending, but it does not block today’s dashboard access. I can help organize tasks, draft letters, create reminders, or capture what you want Libby to remember.'});
}else{
  state.chat.unshift({r:'libby',m:'Good morning, '+(names[appUser]||'there')+'. I prepared your workspace. Tell me the first thing you want Libby to help organize.'});
}
localStorage.setItem('libby_librarian_state_v2',JSON.stringify(state));
document.getElementById('msg').textContent='Workspace ready for '+(packet?.profile?.preferred_name||names[appUser]||appUser)+'.';
setTimeout(()=>{location.href='libby_librarian.html?from=enter&user='+encodeURIComponent(rawUser)},650);
</script>
</body>
</html>
