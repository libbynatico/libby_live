name: Libby Drive Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run ingest worker
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LIBBY_DRIVE_INBOX_FOLDER_ID: ${{ secrets.LIBBY_DRIVE_INBOX_FOLDER_ID }}
          LIBBY_LEDGER_SPREADSHEET_ID: ${{ secrets.LIBBY_LEDGER_SPREADSHEET_ID }}
        run: python scripts/drive_ingest.py
