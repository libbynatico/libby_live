<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Libby Live — Voice-First Case Assistant</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111831;
      --text: #eef2ff;
      --muted: #a7b0d6;
      --accent: #75a7ff;
      --ok: #42c08c;
      --warn: #f2bb5e;
      --danger: #ef6f6f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .widget {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 380px;
      max-height: 85vh;
      background: var(--panel);
      border: 1px solid #2a396d;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      z-index: 999999;
    }

    .widget-header {
      padding: 16px;
      border-bottom: 1px solid #2a396d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-title {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(66, 192, 140, 0.15);
      color: var(--ok);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-pill.recording {
      background: rgba(239, 111, 111, 0.15);
      color: var(--danger);
    }

    .widget-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget-close:hover { color: var(--text); }

    .dashboard {
      padding: 12px 16px;
      background: rgba(10,16,34,.5);
      border-bottom: 1px solid #2a396d;
      font-size: 12px;
    }

    .dashboard-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(42,57,109,.3);
    }

    .dashboard-item:last-child { margin-bottom: 0; border-bottom: none; }

    .dashboard-label { color: var(--muted); }
    .dashboard-value { color: var(--accent); font-weight: 500; }

    .transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transcript-chunk {
      background: rgba(42,57,109,.3);
      border-left: 2px solid var(--accent);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
    }

    .transcript-chunk.speaker-match { border-left-color: var(--ok); }

    .chat-input {
      padding: 12px 16px;
      border-top: 1px solid #2a396d;
      display: flex;
      gap: 8px;
      background: var(--panel);
    }

    .record-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .record-btn:hover { background: rgba(117,167,255,.1); }
    .record-btn.recording { background: var(--danger); color: #fff; border-color: var(--danger); }

    .input-field {
      flex: 1;
      background: rgba(42,57,109,.3);
      border: 1px solid #2a396d;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
    }

    .input-field::placeholder { color: var(--muted); }
    .input-field:focus { outline: none; border-color: var(--accent); }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #9cc2ff; }

    @media (max-width: 600px) {
      .widget { width: 100%; right: 0; bottom: 0; border-radius: 16px 16px 0 0; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <h2 class="widget-title">
        🎙️ Libby Live
        <span class="status-pill" id="statusPill">Ready</span>
      </h2>
      <button class="widget-close" id="closeBtn">×</button>
    </div>

    <div class="dashboard" id="dashboard">
      <div class="dashboard-item">
        <span class="dashboard-label">Today</span>
        <span class="dashboard-value" id="todayCount">—</span>
      </div>
      <div class="dashboard-item">
        <span class="dashboard-label">This Week</span>
        <span class="dashboard-value" id="weekCount">—</span>
      </div>
      <div class="dashboard-item">
        <span class="dashboard-label">Meeting</span>
        <span class="dashboard-value" id="meetingStatus">—</span>
      </div>
    </div>

    <div class="transcript-area" id="transcriptArea"></div>

    <div class="chat-input">
      <button class="record-btn" id="recordBtn" title="Press to record">🎤</button>
      <input type="text" class="input-field" id="chatInput" placeholder="Type or press 🎤 to speak..." />
      <button class="send-btn" id="sendBtn">→</button>
    </div>
  </div>

  <script>
    const widget = {
      recordBtn: document.getElementById('recordBtn'),
      transcriptArea: document.getElementById('transcriptArea'),
      chatInput: document.getElementById('chatInput'),
      sendBtn: document.getElementById('sendBtn'),
      closeBtn: document.getElementById('closeBtn'),
      statusPill: document.getElementById('statusPill'),
      dashboard: document.getElementById('dashboard'),
      recognition: null,
      isRecording: false,
      transcript: '',
      currentMeeting: null,
      appointments: [],
      context: {
        location: null,
        contacts: [],
        correspondenceContext: [],
      },
    };

    // Initialize Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      widget.recognition = new SpeechRecognition();
      widget.recognition.continuous = true;
      widget.recognition.interimResults = true;
      widget.recognition.lang = 'en-US';

      widget.recognition.onstart = () => {
        widget.isRecording = true;
        widget.recordBtn.classList.add('recording');
        widget.statusPill.textContent = 'Recording...';
        widget.statusPill.classList.add('recording');
      };

      widget.recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            widget.transcript += transcript + ' ';
          } else {
            interim += transcript;
          }
        }
        displayTranscript(widget.transcript + interim);
      };

      widget.recognition.onend = () => {
        widget.isRecording = false;
        widget.recordBtn.classList.remove('recording');
        widget.statusPill.textContent = 'Ready';
        widget.statusPill.classList.remove('recording');
        if (widget.transcript.trim()) {
          widget.chatInput.value = widget.transcript;
          widget.transcript = '';
        }
      };
    }

    // Geolocation & Calendar Detection
    async function detectMeeting() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          const lat = pos.coords.latitude.toFixed(4);
          const lng = pos.coords.longitude.toFixed(4);
          widget.context.location = { lat, lng };
          checkCalendarForLocation(lat, lng);
        });
      }
    }

    async function checkCalendarForLocation(lat, lng) {
      // Stub: In Phase 2, connect to Google Calendar API
      // For now, show placeholder
      document.getElementById('meetingStatus').textContent = 'Checking...';
    }

    function displayTranscript(text) {
      const lastChunk = widget.transcriptArea.lastElementChild;
      if (lastChunk && lastChunk.classList.contains('transcript-chunk')) {
        lastChunk.textContent = text;
      } else {
        const chunk = document.createElement('div');
        chunk.className = 'transcript-chunk';
        chunk.textContent = text;
        widget.transcriptArea.appendChild(chunk);
        widget.transcriptArea.scrollTop = widget.transcriptArea.scrollHeight;
      }
    }

    async function sendChat() {
      const message = widget.chatInput.value.trim();
      if (!message) return;

      widget.chatInput.value = '';

      try {
        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: 'mattherbert01',
            messages: [{ role: 'user', content: message }],
            context: widget.context,
          }),
        });

        const data = await response.json();
        displayTranscript(`Libby: ${data.reply}`);
      } catch (err) {
        console.error('Chat error:', err);
        displayTranscript(`Error: ${err.message}`);
      }
    }

    // Event Listeners
    widget.recordBtn.addEventListener('click', () => {
      if (widget.recognition) {
        if (widget.isRecording) {
          widget.recognition.stop();
        } else {
          widget.transcriptArea.innerHTML = '';
          widget.recognition.start();
        }
      }
    });

    widget.sendBtn.addEventListener('click', sendChat);
    widget.chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChat();
    });

    widget.closeBtn.addEventListener('click', () => {
      widget.widget = document.querySelector('.widget');
      if (widget.widget) widget.widget.style.display = 'none';
    });

    // Initialize
    detectMeeting();
    // Load dashboard (stub for now)
    document.getElementById('todayCount').textContent = '1';
    document.getElementById('weekCount').textContent = '3';
    document.getElementById('meetingStatus').textContent = '—';
  </script>
</body>
</html>
